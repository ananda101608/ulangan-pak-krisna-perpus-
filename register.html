<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Anggota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
      <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #f8f9fa;
        }
        .registration-card {
            max-width: 500px;
            margin: 50px auto;
            border: none;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card registration-card shadow-lg">
        <div class="card-body p-4 p-md-5">
            <header class="text-center mb-4">
                <h2 class="fw-bold text-primary">📝 Daftar Anggota</h2>
                <p class="text-muted">Dapatkan akses ribuan buku sekarang.</p>
                <a href="index.html" class="btn btn-sm btn-outline-secondary">← Kembali ke Beranda</a>
            </header>

          <hr class="mb-4">

            <main>
              <form action="index.html" method="POST">
                    
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                        <label for="floatingInput">Alamat Email</label>
              </div>
             <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
           <label for="floatingPassword">Kata Sandi</label>
               </div>
           <div class="mb-4">
                        <label class="form-label fw-bold mb-2">Pilih Kategori Minat Buku:</label>
           <div class="row g-2">
                            <div class="col-4">
             <div class="form-check">
           <input class="form-check-input" type="checkbox" value="sains" id="checkSains">
                        <label class="form-check-label" for="checkSains">Sains</label>
                        </div>
                 </div>
                          <div class="col-4">
                                <div class="form-check">
                                 <input class="form-check-input" type="checkbox" value="fiksi" id="checkFiksi">
                                <label class="form-check-label" for="checkFiksi">Fiksi</label>
                                </div>
                         </div>
                            <div class="col-4">
                          <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="sejarah" id="checkSejarah">                                 <label class="form-check-label" for="checkSejarah">Sejarah</label>
                           </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm fw-bold">
                        Konfirmasi Pendaftaran
                    </button>
                   
                    
                    <p class="text-center mt-3 small text-muted">
                        Dengan mendaftar, Anda menyetujui syarat & ketentuan kami.
                    </p>
                </form>
            </main>
        </div>
    </div>
</div>


</body>
</html>
